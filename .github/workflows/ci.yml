name: CI — Lint & Tests

on:
  push:
    branches: ["main", "features", "features/*", "fix/*"]
    paths:
      - "**.py"
      - "**.ipynb"
      - "requirements*.txt"
      - ".pycodestyle"
  pull_request:
    branches: ["main"]
    paths:
      - "**.py"
      - "**.ipynb"
      - "requirements*.txt"
      - ".pycodestyle"

jobs:
  lint-and-test:
    name: Python ${{ matrix.python-version }} — Lint & Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      # ------------------------------------------------------------------
      # 1. Récupérer le code
      # ------------------------------------------------------------------
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Installer Python
      # ------------------------------------------------------------------
      - name: Configurer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      # ------------------------------------------------------------------
      # 3. Installer les dépendances
      # ------------------------------------------------------------------
      - name: Installer les dépendances du pipeline
        run: pip install -r requirements.txt

      - name: Installer les dépendances de l'application Streamlit
        run: pip install -r Streamlit-App/requirements.txt

      - name: Installer les outils de lint
        run: pip install -r requirements-lint.txt

      - name: Installer nbqa (lint des notebooks Jupyter)
        run: pip install nbqa

      - name: Installer pytest
        run: pip install pytest pytest-cov

      # ------------------------------------------------------------------
      # 4. Linting PEP8 — pycodestyle (tout le repo)
      # ------------------------------------------------------------------
      - name: Vérification PEP8 (pycodestyle) — tout le repo
        run: python tests/check_pep8.py

